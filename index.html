<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汉语测试 — Chinese Test</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --red:   #E63946;
      --gold:  #FFB627;
      --cream: #FFF8EC;
      --paper: #FFFDF7;
      --ink:   #1A1423;
      --jade:  #06A77D;
      --plum:  #7B2D26;
      --silver:#C0C0C0;
      --bronze:#CD7F32;
      --fd: 'ZCOOL KuaiLe', cursive;
      --fs: 'Noto Serif SC', serif;
      --fb: 'Outfit', sans-serif;
      --border: 3px solid var(--ink);
      --r: 16px;
      --rl: 24px;
      --sh: 0 8px 0 var(--ink);
      --shs: 0 4px 0 var(--ink);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--fb);background:var(--cream);min-height:100vh;overflow-x:hidden;position:relative}

    body::before,body::after{
      content:'学';
      position:fixed;font-family:'ZCOOL KuaiLe',cursive;font-size:300px;
      color:rgba(230,57,70,.04);z-index:0;pointer-events:none;
      animation:bob 6s ease-in-out infinite;
    }
    body::before{top:-50px;left:-80px}
    body::after{content:'习';bottom:-50px;right:-80px;animation-delay:-3s}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-20px) rotate(5deg)}}

    /* NAV */
    #nav{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:8px}
    .nl{background:var(--paper);border:var(--border);border-radius:999px;padding:8px 18px;
        font-family:var(--fb);font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;
        color:var(--ink);box-shadow:var(--shs);transition:transform .1s,box-shadow .1s}
    .nl:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--ink)}
    .nl:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink)}

    #root{position:relative;z-index:1;min-height:100vh;padding:80px 16px 40px}
    body.tv-mode #nav{display:none}
    body.tv-mode #root{padding:0}

    .container{max-width:620px;margin:0 auto}
    .card{background:var(--paper);border:var(--border);border-radius:var(--rl);padding:32px;box-shadow:var(--sh)}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
         padding:14px 28px;border:var(--border);border-radius:var(--r);
         font-family:var(--fb);font-weight:800;font-size:16px;cursor:pointer;
         box-shadow:var(--shs);transition:transform .1s,box-shadow .1s;text-decoration:none}
    .btn:hover{transform:translateY(-3px);box-shadow:0 7px 0 var(--ink)}
    .btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink)}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:var(--shs)!important}
    .btn-red{background:var(--red);color:#fff}
    .btn-gold{background:var(--gold);color:var(--ink)}
    .btn-jade{background:var(--jade);color:#fff}
    .btn-ink{background:var(--ink);color:#fff}
    .btn-ghost{background:transparent;color:var(--ink)}
    .btn-sm{padding:8px 16px;font-size:14px}
    .btn-lg{padding:18px 40px;font-size:20px}

    /* INPUTS */
    input,select,textarea{width:100%;padding:12px 16px;border:var(--border);border-radius:var(--r);
      font-family:var(--fb);font-size:16px;background:var(--cream);color:var(--ink);
      outline:none;transition:box-shadow .2s}
    input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(230,57,70,.3)}
    label{display:block;font-weight:700;font-size:13px;text-transform:uppercase;
          letter-spacing:.05em;margin-bottom:6px;color:var(--ink)}
    .field{margin-bottom:20px}

    /* BANNER */
    .banner{background:var(--red);color:#fff;padding:20px 32px;border:var(--border);
            border-radius:var(--rl);box-shadow:var(--sh);transform:rotate(-1deg);
            margin-bottom:24px;position:relative;text-align:center}
    .bd{position:absolute;width:18px;height:18px;background:var(--gold);border:2px solid #fff;border-radius:50%}
    .bd.tl{top:10px;left:10px}.bd.tr{top:10px;right:10px}
    .bd.bl{bottom:10px;left:10px}.bd.br{bottom:10px;right:10px}
    .banner h1{font-family:'ZCOOL KuaiLe',cursive;font-size:56px;line-height:1}
    .banner .sub{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-top:4px}

    /* PROGRESS */
    .pbw{width:100%;height:10px;background:rgba(0,0,0,.1);border-radius:999px;
         border:2px solid var(--ink);overflow:hidden;margin-bottom:16px}
    .pbf{height:100%;background:var(--red);border-radius:999px;transition:width .3s ease}

    /* OPTIONS */
    .opt{width:100%;padding:16px;border:var(--border);border-radius:var(--r);
         background:var(--cream);color:var(--ink);font-family:var(--fb);font-size:16px;
         font-weight:600;cursor:pointer;box-shadow:var(--shs);
         transition:transform .1s,box-shadow .1s,background .1s;text-align:left}
    .opt:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--ink)}
    .opt:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink)}
    .opt.sel{background:var(--red);color:#fff;animation:pop .2s ease}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

    .og{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
    @media(max-width:600px){.og{grid-template-columns:1fr}}

    /* SCORE CIRCLE */
    .sc{width:160px;height:160px;border-radius:50%;border:var(--border);
        display:flex;align-items:center;justify-content:center;
        margin:0 auto 24px;box-shadow:var(--sh);position:relative}

    /* PILL */
    .pill{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;
          border:2px solid var(--ink);border-radius:999px;font-size:13px;font-weight:700;background:var(--paper)}

    /* TABS */
    .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .tab{padding:10px 18px;border:var(--border);border-radius:var(--r);font-family:var(--fb);
         font-weight:700;font-size:14px;cursor:pointer;background:var(--cream);
         box-shadow:var(--shs);transition:transform .1s,box-shadow .1s,background .1s}
    .tab:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--ink)}
    .tab:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink)}
    .tab.on{background:var(--red);color:#fff}

    /* MESSAGES */
    .err{background:rgba(230,57,70,.1);border:2px solid var(--red);border-radius:8px;
         padding:10px 14px;color:var(--red);font-weight:700;font-size:14px;margin-top:8px}
    .ok{background:rgba(6,167,125,.1);border:2px solid var(--jade);border-radius:8px;
        padding:10px 14px;color:var(--jade);font-weight:700;font-size:14px;margin-top:8px}

    /* ADMIN CARDS */
    .qc{background:var(--paper);border:var(--border);border-radius:var(--r);padding:16px;
        margin-bottom:12px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .sr{background:var(--paper);border:var(--border);border-radius:var(--r);padding:12px 16px;
        margin-bottom:8px;display:flex;align-items:center;gap:12px}
    .pb{padding:4px 10px;border-radius:999px;font-weight:800;font-size:13px;border:2px solid var(--ink)}
    .pg{background:rgba(6,167,125,.2);color:var(--jade)}
    .py{background:rgba(255,182,39,.2);color:#a07000}
    .pr{background:rgba(230,57,70,.2);color:var(--red)}

    /* TV */
    .tvbg{background:var(--ink);min-height:100vh;padding:24px;
          background-image:radial-gradient(ellipse at 10% 20%,rgba(230,57,70,.15) 0%,transparent 60%),
                           radial-gradient(ellipse at 90% 80%,rgba(255,182,39,.10) 0%,transparent 60%)}
    .tvg{display:grid;grid-template-columns:1.4fr 1fr;gap:24px;margin-top:24px}
    @media(max-width:900px){.tvg{grid-template-columns:1fr}}

    .lrow{display:flex;align-items:center;gap:12px;padding:12px 16px;
          border-radius:var(--r);margin-bottom:8px;border:2px solid transparent}
    .lrow.r1{background:linear-gradient(135deg,rgba(255,182,39,.2),rgba(255,182,39,.05));border-color:var(--gold);transform:scale(1.04)}
    .lrow.r2{background:linear-gradient(135deg,rgba(192,192,192,.2),rgba(192,192,192,.05));border-color:var(--silver)}
    .lrow.r3{background:linear-gradient(135deg,rgba(205,127,50,.2),rgba(205,127,50,.05));border-color:var(--bronze)}

    /* CELEBRATION */
    #cov{position:fixed;inset:0;z-index:200;background:rgba(26,20,35,.92);
         backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center}
    #cov.on{display:flex;animation:fi .3s ease}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    .cc{background:var(--cream);border:6px solid var(--gold);border-radius:var(--rl);
        box-shadow:20px 20px 0 var(--ink);padding:48px 56px;text-align:center;
        max-width:600px;width:90%;animation:slam .5s cubic-bezier(.34,1.56,.64,1)}
    @keyframes slam{
      0%{transform:scale(.3) rotate(-10deg);opacity:0}
      70%{transform:scale(1.08) rotate(2deg);opacity:1}
      100%{transform:scale(1) rotate(0deg);opacity:1}
    }
    .cm{font-size:140px;line-height:1;animation:be .6s ease infinite alternate;display:block}
    @keyframes be{from{transform:translateY(0)}to{transform:translateY(-15px)}}

    #cc{position:fixed;inset:0;z-index:300;pointer-events:none}

    @keyframes si{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
    .si{animation:si .3s ease}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

    /* ── TOUCH & TAP ── */
    button,a,.opt,.btn,.nl,.tab{
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    /* ── MOBILE ── */
    @media(max-width:520px){
      /* Decorative bg chars too big on phone */
      body::before,body::after{font-size:160px}

      /* Nav — smaller pills, less gap */
      #nav{top:10px;right:10px;gap:6px}
      .nl{padding:6px 12px;font-size:13px}

      /* Root top padding matches smaller nav */
      #root{padding:64px 12px 32px}

      /* Cards — tighter padding */
      .card{padding:20px 16px;border-radius:16px}

      /* Banner — scale down */
      .banner{padding:16px 20px;border-radius:16px}
      .banner h1{font-size:38px}
      .banner .sub{font-size:11px;letter-spacing:.15em}

      /* Buttons — full width on small screens, better tap area */
      .btn{padding:14px 20px;font-size:15px;border-radius:12px;min-height:48px}
      .btn-lg{padding:16px 20px;font-size:18px}
      .btn-sm{padding:10px 14px;font-size:13px;min-height:40px}

      /* Inputs — already 16px (no iOS zoom) */
      input,select{padding:13px 14px;border-radius:12px;font-size:16px}

      /* Quiz Chinese character */
      .si .zh-char{font-size:56px}

      /* Options — single column, taller tap target */
      .og{grid-template-columns:1fr;gap:10px;margin:14px 0}
      .opt{padding:18px 14px;font-size:15px;border-radius:12px;min-height:52px}

      /* Quiz header row — tighter */
      .quiz-header{font-size:13px}

      /* Quiz nav row — space items properly */
      .quiz-nav{gap:8px}
      .quiz-nav .btn{flex:1;padding:14px 8px;font-size:14px}
      .quiz-nav .pill{font-size:12px;padding:5px 10px;white-space:nowrap}

      /* Score circle — slightly smaller */
      .sc{width:140px;height:140px}

      /* Result praise text */
      .result-zh{font-size:38px}
      .result-en{font-size:18px}

      /* Admin tabs — horizontal scroll instead of wrap */
      .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
            padding-bottom:4px;gap:6px}
      .tabs::-webkit-scrollbar{height:3px}
      .tabs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:99px}
      .tab{white-space:nowrap;padding:9px 14px;font-size:13px;flex-shrink:0}

      /* Admin question cards */
      .qc{flex-direction:column;gap:10px}
      .qc .btn{width:100%}

      /* Celebration card — tighter on phone */
      .cc{padding:32px 24px}
      .cm{font-size:90px}

      /* Field spacing */
      .field{margin-bottom:16px}
    }

    /* Mid-range phones / small tablets */
    @media(min-width:521px) and (max-width:768px){
      .card{padding:24px 20px}
      .banner h1{font-size:46px}
      .og{gap:10px}
      .opt{padding:16px;font-size:15px}
    }
  </style>
</head>
<body>
  <nav id="nav">
    <a href="#/" class="nl">🏠 Home</a>
    <a href="#/admin" class="nl">⚙️ Admin</a>
  </nav>
  <canvas id="cc"></canvas>
  <div id="cov"><div id="ccard"></div></div>
  <div id="root"></div>

<script>
// ── FIREBASE CONFIG ───────────────────────────────────────────────────────────
// Setup (free, 2 minutes):
// 1. Go to https://console.firebase.google.com → Add project
// 2. Build → Realtime Database → Create database → Start in TEST mode
// 3. Copy the URL shown (e.g. https://your-app-default-rtdb.firebaseio.com)
// 4. Paste it below replacing the empty string, then redeploy
const FIREBASE_URL = 'https://chinese-quiz-website-default-rtdb.asia-southeast1.firebasedatabase.app';

// ── REMOTE SYNC ───────────────────────────────────────────────────────────────
const REMOTE = {
  ok(){ return typeof FIREBASE_URL==='string' && FIREBASE_URL.length>0; },
  async get(k){
    try{const r=await fetch(`${FIREBASE_URL}/${k}.json`);return r.ok?await r.json():null;}catch{return null;}
  },
  async set(k,v){
    try{await fetch(`${FIREBASE_URL}/${k}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});}catch{}
  },
  async del(k){
    try{await fetch(`${FIREBASE_URL}/${k}.json`,{method:'DELETE'});}catch{}
  }
};

// Firebase stores arrays as objects {0:…,1:…} — convert back to array
function toArr(v){
  if(v===null||v===undefined)return null;
  if(Array.isArray(v))return v;
  if(typeof v==='object')return Object.values(v);
  return null;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const STORE = {
  getQuestions(){try{const q=localStorage.getItem('chq_q');return q?JSON.parse(q):null}catch{return null}},
  setQuestions(q){
    try{localStorage.setItem('chq_q',JSON.stringify(q));}catch{}
    if(REMOTE.ok())REMOTE.set('chq_q',q);
  },
  getScores(){try{const s=localStorage.getItem('chq_s');return s?JSON.parse(s):[]}catch{return[]}},
  addScore(e){
    try{const s=this.getScores();s.push(e);localStorage.setItem('chq_s',JSON.stringify(s));if(REMOTE.ok())REMOTE.set('chq_s',s);}catch{}
  },
  clearScores(){
    try{localStorage.removeItem('chq_s');}catch{}
    if(REMOTE.ok())REMOTE.set('chq_s',[]);
  },
  getSettings(){try{const s=localStorage.getItem('chq_cfg');return s?JSON.parse(s):{numQuestions:15,adminPassword:'teacher123'}}catch{return{numQuestions:15,adminPassword:'teacher123'}}},
  setSettings(s){
    try{localStorage.setItem('chq_cfg',JSON.stringify(s));}catch{}
    if(REMOTE.ok())REMOTE.set('chq_cfg',s);
  },
  getActive(){try{const a=localStorage.getItem('chq_active');return a?JSON.parse(a):null}catch{return null}},
  setActive(a){
    try{localStorage.setItem('chq_active',JSON.stringify(a));}catch{}
    if(REMOTE.ok())REMOTE.set('chq_active',a);
  },
  clearActive(){
    try{localStorage.removeItem('chq_active');}catch{}
    if(REMOTE.ok())REMOTE.del('chq_active');
  }
};

// ── APP INIT (sync from Firebase before first render) ─────────────────────────
async function initApp(){
  if(REMOTE.ok()){
    try{
      const [q,s,cfg,act]=await Promise.all([
        REMOTE.get('chq_q'),REMOTE.get('chq_s'),
        REMOTE.get('chq_cfg'),REMOTE.get('chq_active')
      ]);
      const synced=localStorage.getItem('chq_synced');
      const qArr=toArr(q);
      if(qArr!==null){
        localStorage.setItem('chq_q',JSON.stringify(qArr));
      } else if(synced){
        // Previously synced but now empty — teacher deleted all questions
        localStorage.setItem('chq_q',JSON.stringify([]));
      }
      const sArr=toArr(s)||[];
      localStorage.setItem('chq_s',JSON.stringify(sArr));
      if(cfg)localStorage.setItem('chq_cfg',JSON.stringify(cfg));
      if(act)localStorage.setItem('chq_active',JSON.stringify(act));
      else localStorage.removeItem('chq_active');
      localStorage.setItem('chq_synced','1');
    }catch(e){console.warn('Firebase sync failed, using local storage',e);}
  }
  route();
}

// ── DEFAULT QUESTIONS ────────────────────────────────────────────────────────
const DEFAULTS = [
  {type:'pinyin',zh:'你好',   options:['nǐ hǎo','xiè xie','zài jiàn','lǎo shī'],  answer:0,meaning:'Hello'},
  {type:'pinyin',zh:'谢谢',   options:['xiè xie','nǐ hǎo','zài jiàn','xuéshēng'],answer:0,meaning:'Thank you'},
  {type:'pinyin',zh:'再见',   options:['zài jiàn','nǐ hǎo','xiè xie','míngtiān'],answer:0,meaning:'Goodbye'},
  {type:'pinyin',zh:'老师',   options:['lǎo shī','xuéshēng','péngyou','jiārén'], answer:0,meaning:'Teacher'},
  {type:'pinyin',zh:'学生',   options:['xuéshēng','lǎo shī','péngyou','māma'],   answer:0,meaning:'Student'},
  {type:'translate',zh:'家',  options:['Home / Family','School','Water','Book'],  answer:0,meaning:'jiā'},
  {type:'translate',zh:'水',  options:['Water','Fire','Earth','Wind'],            answer:0,meaning:'shuǐ'},
  {type:'translate',zh:'吃',  options:['To eat','To drink','To sleep','To run'],  answer:0,meaning:'chī'},
  {type:'translate',zh:'书',  options:['Book','Pen','Chair','Table'],             answer:0,meaning:'shū'},
  {type:'translate',zh:'红色',options:['Red','Blue','Green','Yellow'],            answer:0,meaning:'hóng sè'},
  {type:'translate',zh:'蓝色',options:['Blue','Red','Green','White'],             answer:0,meaning:'lán sè'},
  {type:'translate',zh:'绿色',options:['Green','Blue','Yellow','Red'],            answer:0,meaning:'lǜ sè'},
  {type:'translate',zh:'爸爸',options:['Father / Dad','Mother / Mum','Brother','Sister'],answer:0,meaning:'bà ba'},
  {type:'translate',zh:'妈妈',options:['Mother / Mum','Father / Dad','Grandma','Grandpa'],answer:0,meaning:'mā ma'},
  {type:'translate',zh:'猫',  options:['Cat','Dog','Bird','Fish'],                answer:0,meaning:'māo'},
  {type:'translate',zh:'狗',  options:['Dog','Cat','Horse','Rabbit'],             answer:0,meaning:'gǒu'},
  {type:'translate',zh:'饭',  options:['Rice / Meal','Bread','Noodles','Soup'],   answer:0,meaning:'fàn'},
  {type:'translate',zh:'今天',options:['Today','Yesterday','Tomorrow','Now'],     answer:0,meaning:'jīn tiān'},
  {type:'translate',zh:'明天',options:['Tomorrow','Today','Yesterday','Next week'],answer:0,meaning:'míng tiān'},
  {type:'translate',zh:'朋友',options:['Friend','Teacher','Student','Family'],    answer:0,meaning:'péngyou'},
  {type:'translate',zh:'大',  options:['Big / Large','Small','Old','New'],        answer:0,meaning:'dà'},
  {type:'translate',zh:'小',  options:['Small / Little','Big','Fast','Slow'],     answer:0,meaning:'xiǎo'},
  {type:'translate',zh:'好',  options:['Good / Well','Bad','Happy','Sad'],        answer:0,meaning:'hǎo'},
  {type:'translate',zh:'喝',  options:['To drink','To eat','To walk','To talk'],  answer:0,meaning:'hē'},
  {type:'translate',zh:'看',  options:['To look / watch','To listen','To speak','To write'],answer:0,meaning:'kàn'},
  {type:'meaning',zh:'一',    options:['1','2','3','4'],   answer:0,meaning:'yī'},
  {type:'meaning',zh:'三',    options:['3','1','2','5'],   answer:0,meaning:'sān'},
  {type:'meaning',zh:'五',    options:['5','4','6','7'],   answer:0,meaning:'wǔ'},
  {type:'meaning',zh:'七',    options:['7','6','8','9'],   answer:0,meaning:'qī'},
  {type:'meaning',zh:'十',    options:['10','9','8','7'],  answer:0,meaning:'shí'},
];

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}
function shuffleQ(q){
  const correct=q.options[q.answer];
  const s=shuffle(q.options);
  return{...q,options:s,answer:s.indexOf(correct)};
}
function ensureQ(){
  let q=STORE.getQuestions();
  if(q===null){STORE.setQuestions(DEFAULTS);q=DEFAULTS;}
  return q;
}
function prompt_(t){
  if(t==='pinyin')return'How do you read this?';
  if(t==='translate')return'What does this mean?';
  if(t==='meaning')return'What number is this?';
  return'';
}
function medal(p){return p>=90?'🏆':p>=75?'🥇':p>=60?'🥈':p>=40?'🥉':'🌱'}
function praise(p){
  if(p>=90)return{zh:'太棒了!',en:'Outstanding!'};
  if(p>=75)return{zh:'很好!',en:'Excellent!'};
  if(p>=60)return{zh:'不错!',en:'Great job!'};

// ── CONFETTI ─────────────────────────────────────────────────────────────────
function confetti(dur=3000){
  const cv=document.getElementById('cc');
  const ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#E63946','#FFB627','#06A77D','#7B2D26','#fff','#1A1423'];
  const ps=Array.from({length:60},()=>({
    x:Math.random()*cv.width,y:-10-Math.random()*200,
    r:4+Math.random()*6,c:cols[Math.floor(Math.random()*cols.length)],
    sp:2+Math.random()*4,sw:Math.random()*4-2,
    rot:Math.random()*360,rs:Math.random()*10-5
  }));
  const t0=Date.now();
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    const el=Date.now()-t0;
    const fade=Math.max(0,1-(el-dur*.7)/(dur*.3));
    ps.forEach(p=>{
      p.y+=p.sp;p.x+=Math.sin(p.y*.05)*p.sw;p.rot+=p.rs;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.c;ctx.globalAlpha=fade;
      ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore();
      if(p.y>cv.height){p.y=-10;p.x=Math.random()*cv.width;}
    });
    if(Date.now()-t0<dur)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

// ── QUIZ ─────────────────────────────────────────────────────────────────────
let qQs=[], qAs=[], qCur=0;

function renderQuiz(){
  const stu=JSON.parse(sessionStorage.getItem('chq_stu')||'null');
  if(!stu){location.hash='#/';return;}
  if(qQs.length===0){
    const cfg=STORE.getSettings();
    const all=ensureQ();
    const num=Math.min(cfg.numQuestions,all.length);
    qQs=shuffle(all).slice(0,num).map(shuffleQ);
    qAs=new Array(num).fill(-1);
    qCur=0;
    STORE.setActive({name:stu.name,cls:stu.cls});
  }
  drawQ(stu);
}

function drawQ(stu){
  if(!stu)stu=JSON.parse(sessionStorage.getItem('chq_stu'));
  const q=qQs[qCur];
  const total=qQs.length;
  const answered=qAs.filter(a=>a!==-1).length;
  const pct=((qCur+1)/total*100).toFixed(0);
  const isLast=qCur===total-1;
  R().innerHTML=`
  <div class="container">
    <div class="pbw"><div class="pbf" style="width:${pct}%"></div></div>
    <div class="quiz-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-weight:700;font-size:15px">Question ${qCur+1} / ${total}</span>
      <span style="font-weight:600;font-size:14px">👤 ${esc(stu.name)}</span>
    </div>
    <div class="card si">
      <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--plum);margin-bottom:8px">
        ${esc(prompt_(q.type))}
      </div>
      <div class="zh-char" style="font-family:'ZCOOL KuaiLe',cursive;font-size:72px;text-align:center;margin:16px 0;line-height:1">
        ${esc(q.zh)}
      </div>
      <div class="og">
        ${q.options.map((o,i)=>`
          <button class="opt ${qAs[qCur]===i?'sel':''}" onclick="selOpt(${i})">
            ${esc(o)}
          </button>`).join('')}
      </div>
    </div>
    <div class="quiz-nav" style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:12px">
      <button class="btn btn-ghost" onclick="prevQ()" ${qCur===0?'disabled':''}>← Prev</button>
      <span class="pill" style="font-size:14px">${answered} / ${total}</span>
      ${isLast
        ?`<button class="btn btn-red" onclick="submitQuiz()">Submit ✓</button>`
        :`<button class="btn btn-ink" onclick="nextQ()">Next →</button>`}
    </div>
  </div>`;
}

function selOpt(i){qAs[qCur]=i;drawQ();}
function prevQ(){if(qCur>0){qCur--;drawQ();}}
function nextQ(){if(qCur<qQs.length-1){qCur++;drawQ();}}

function submitQuiz(){
  const un=qAs.filter(a=>a===-1).length;
  if(un>0&&!confirm(`You have ${un} unanswered question${un>1?'s':''}. Submit anyway?`))return;
  let score=0;
  qQs.forEach((q,i)=>{if(qAs[i]===q.answer)score++;});
  const total=qQs.length;
  const pct=Math.round(score/total*100);
  const stu=JSON.parse(sessionStorage.getItem('chq_stu'));
  const entry={name:stu.name,cls:stu.cls,score,total,pct,timestamp:Date.now()};
  STORE.addScore(entry);
  STORE.clearActive();
  sessionStorage.setItem('chq_res',JSON.stringify(entry));
  qQs=[];qAs=[];qCur=0;
  location.hash='#/result';
}

async function pollTV(){
  if(REMOTE.ok()){
    try{
      const [s,act]=await Promise.all([REMOTE.get('chq_s'),REMOTE.get('chq_active')]);

      localStorage.setItem('chq_s',JSON.stringify(sArr));
      if(act)localStorage.setItem('chq_active',JSON.stringify(act));
      else localStorage.removeItem('chq_active');
    }catch{}
  }
  const scores=STORE.getScores();
  const fresh=scores.filter(s=>s.timestamp>lastSeen);
  if(fresh.length){
    fresh.sort((a,b)=>a.timestamp-b.timestamp);
    lastSeen=fresh[fresh.length-1].timestamp;
    drawTV();
    celebrate(fresh[fresh.length-1]);
  } else {
    drawTV();
  }
}

  const qs=ensureQ();
  el.innerHTML=!qs.length
    ?`<div style="text-align:center;padding:40px;color:var(--plum)">No questions yet.</div>`
    :qs.map((q,i)=>`
      <div class="qc">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:13px;font-weight:700;color:rgba(26,20,35,.4)">#${i+1}</span>
            <span class="pill" style="font-size:11px;padding:2px 8px">${esc(q.type)}</span>
          </div>
          <div style="font-family:'ZCOOL KuaiLe',cursive;font-size:32px;line-height:1;margin-bottom:6px">${esc(q.zh)}</div>
          <div style="font-size:13px;color:var(--plum)">✓ ${esc(q.options[q.answer])}</div>
        </div>
        <button class="btn btn-red btn-sm" onclick="delQ(${i})">Delete</button>
      </div>`).join('');
}

function delQ(i){
  if(!confirm('Delete this question?'))return;
  const qs=ensureQ();qs.splice(i,1);STORE.setQuestions(qs);renderPanel();
}

function tabAdd(el){
  el.innerHTML=`
  <div class="card">
    <div class="field">
      <label>Question 题目</label>
      <input type="text" id="azh" placeholder="e.g. 你好" autocomplete="off">
    </div>
    <div style="background:rgba(255,182,39,.1);border:2px solid var(--gold);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:16px">
      ⭐ Хариулт 1 нь үргэлж зөв хариулт байдаг. (хариултууд автоматаар холигддоно.)
    </div>
    ${[1,2,3,4].map(n=>`
      <div class="field">
        <label>Option ${n}${n===1?' (correct) ⭐':''}</label>
        <input type="text" id="ao${n}" placeholder="Option ${n}…" autocomplete="off">
      </div>`).join('')}
    <div id="amsg"></div>
    <button class="btn btn-red" style="width:100%;margin-top:8px" onclick="addQ()">➕ Add Question</button>
  </div>`;
}

function addQ(){
  const zh=document.getElementById('azh').value.trim();
  const opts=[1,2,3,4].map(n=>document.getElementById('ao'+n).value.trim());
  const msg=document.getElementById('amsg');
  if(!zh||opts.some(o=>!o)){msg.innerHTML=`<div class="err">Fill in the question and all 4 options.</div>`;return;}
  const qs=ensureQ();
  qs.push({type:'custom',zh,options:opts,answer:0,meaning:''});
  STORE.setQuestions(qs);
  msg.innerHTML=`<div class="ok">✓ Question added! Total: ${qs.length}</div>`;
  document.getElementById('azh').value='';
  [1,2,3,4].forEach(n=>{document.getElementById('ao'+n).value='';});
  document.getElementById('azh').focus();
  setTimeout(()=>renderPanel(),800);
}

function tabLb(el){
  const scores=STORE.getScores();
  const ranked=bestScores(scores);
  const ri=['🥇','🥈','🥉'];
  const rc=[
    'background:linear-gradient(135deg,rgba(255,182,39,.15),rgba(255,182,39,.04));border-color:var(--gold)',
    'background:linear-gradient(135deg,rgba(192,192,192,.15),rgba(192,192,192,.04));border-color:var(--silver)',
    'background:linear-gradient(135deg,rgba(205,127,50,.15),rgba(205,127,50,.04));border-color:var(--bronze)',
  ];

  if(!ranked.length){
    el.innerHTML=`<div style="text-align:center;padding:48px;color:var(--plum);font-size:15px">No results yet — students haven't submitted yet.</div>`;
    return;
  }

  const avg=scores.length?Math.round(scores.reduce((s,e)=>s+e.pct,0)/scores.length):0;

  el.innerHTML=`
  <div>
    <!-- Summary bar -->
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div style="flex:1;min-width:120px;background:var(--paper);border:var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shs);text-align:center">
        <div style="font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--plum);margin-bottom:4px">Students</div>
        <div style="font-size:32px;font-weight:800;color:var(--ink)">${ranked.length}</div>
      </div>
      <div style="flex:1;min-width:120px;background:var(--paper);border:var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shs);text-align:center">
        <div style="font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--plum);margin-bottom:4px">Top Score</div>
        <div style="font-size:32px;font-weight:800;color:var(--red)">${ranked[0].pct}%</div>
      </div>
      <div style="flex:1;min-width:120px;background:var(--paper);border:var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shs);text-align:center">
        <div style="font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--plum);margin-bottom:4px">Class Average</div>
        <div style="font-size:32px;font-weight:800;color:var(--jade)">${avg}%</div>
      </div>
    </div>

    <!-- Ranked list -->
    ${ranked.map((s,i)=>`
      <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border:2px solid ${i<3?'transparent':'var(--ink)'};border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shs);${i<3?rc[i]:'background:var(--paper)'}">
        <div style="font-size:${i<3?'28px':'16px'};width:36px;text-align:center;font-weight:800;color:${i<3?'inherit':'rgba(26,20,35,.35)'}">
          ${i<3?ri[i]:`#${i+1}`}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--plum)">${esc(s.cls)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:26px;font-weight:800;color:${s.pct>=75?'var(--jade)':s.pct>=50?'#a07000':'var(--red)'}">${s.pct}%</div>
          <div style="font-size:12px;color:rgba(26,20,35,.45)">${s.score} / ${s.total}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

function tabSc(el){
  const scores=STORE.getScores();
  const sorted=[...scores].sort((a,b)=>b.timestamp-a.timestamp);
  el.innerHTML=`
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div style="font-weight:700">${scores.length} submission${scores.length!==1?'s':''}</div>
      ${scores.length?`<button class="btn btn-red btn-sm" onclick="clrSc()">Clear All Scores 🗑️</button>`:''}
    </div>
    ${!sorted.length
      ?`<div style="text-align:center;padding:40px;color:var(--plum)">No scores yet.</div>`
      :sorted.map(s=>`
        <div class="sr">
          <span class="pb ${pcls(s.pct)}">${s.pct}%</span>
          <div style="flex:1">
            <div style="font-size:17px;font-weight:800">${esc(s.name)}</div>
            <div style="font-size:12px;color:var(--plum)">${esc(s.cls)} · ${s.score}/${s.total} · ${new Date(s.timestamp).toLocaleString()}</div>
          </div>
        </div>`).join('')}
  </div>`;
}

function clrSc(){
  if(!confirm('Clear all scores? This cannot be undone.'))return;
  STORE.clearScores();renderPanel();
}

function tabSet(el){
  const cfg=STORE.getSettings();
  el.innerHTML=`
  <div class="card">
    <div class="field">
      <label>Questions per Quiz (1–50)</label>
      <input type="number" id="snum" value="${cfg.numQuestions}" min="1" max="50">
    </div>
    <div class="field">
      <label>Admin Password</label>
      <input type="text" id="spw" value="${esc(cfg.adminPassword)}" autocomplete="off">
    </div>
    <div id="smsg"></div>
    <button class="btn btn-jade" style="margin-top:8px" onclick="saveCfg()">Save Settings ✓</button>
    <hr style="border:none;border-top:2px solid rgba(0,0,0,.1);margin:24px 0">
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="resetQs()" style="font-size:14px">Reset Questions to Default 🔄</button>
      <button class="btn btn-ghost" onclick="lockAdmin()" style="font-size:14px">Lock Admin 🔒</button>
    </div>
  </div>`;
}

function saveCfg(){
  const num=parseInt(document.getElementById('snum').value,10);
  const pw=document.getElementById('spw').value.trim();
  const msg=document.getElementById('smsg');
  if(isNaN(num)||num<1||num>50){msg.innerHTML=`<div class="err">Questions must be 1–50.</div>`;return;}
  if(!pw){msg.innerHTML=`<div class="err">Password cannot be empty.</div>`;return;}
  STORE.setSettings({numQuestions:num,adminPassword:pw});
  msg.innerHTML=`<div class="ok">✓ Settings saved!</div>`;
}

function resetQs(){
  if(!confirm('Reset all questions to the default bank? Custom questions will be removed.'))return;
  STORE.setQuestions(DEFAULTS);renderPanel();
}

function lockAdmin(){adminOk=false;renderAdmin();}
</script>
</body>
</html>
